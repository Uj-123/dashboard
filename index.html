<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login - AI Learning 2050</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        
        .login-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 300px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        
        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: none;
        }
        
        button {
            padding: 10px;
            width: 95%;
            background: cyan;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .error {
            color: red;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>🤖 Login</h2>
        <input type="text" id="username" placeholder="Enter Username">
        <input type="password" id="password" placeholder="Enter Password">
        <button onclick="login()">Login</button>
        <p class="error" id="error"></p>
    </div>

    <script>
        function login() {
            let user = document.getElementById("username").value;
            let pass = document.getElementById("password").value;

            // Simple demo login
            if (user === "ujala" && pass === "1234") {
                localStorage.setItem("loggedIn", "true");
                window.location.href = "dashboard.html";
            }
        }
    </script>

</body>

</html>
